<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="配送ルート">
<title>配送ルート最適化</title>
<style>
  :root {
    --bg: #0f1420;
    --card: #1a2233;
    --card2: #212b40;
    --text: #eef2f8;
    --sub: #93a0b5;
    --accent: #3b82f6;
    --accent2: #22c55e;
    --danger: #ef4444;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg); color: var(--text);
    padding: max(env(safe-area-inset-top), 16px) 16px calc(env(safe-area-inset-bottom) + 32px);
    max-width: 560px; margin: 0 auto;
  }
  h1 { font-size: 20px; margin: 8px 0 2px; display: flex; align-items: center; gap: 8px; }
  .sub { color: var(--sub); font-size: 13px; margin-bottom: 16px; }
  .card { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
  label { display: block; font-size: 13px; color: var(--sub); margin-bottom: 6px; font-weight: 600; }
  input[type=text], textarea {
    width: 100%; background: var(--card2); color: var(--text);
    border: 1px solid #2e3a52; border-radius: 10px;
    padding: 12px; font-size: 16px; outline: none;
  }
  input[type=text]:focus, textarea:focus { border-color: var(--accent); }
  textarea { min-height: 150px; resize: vertical; line-height: 1.6; }
  .row { display: flex; gap: 8px; align-items: center; }
  .row > input[type=text] { flex: 1; }
  button {
    border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
    padding: 12px 14px; cursor: pointer; color: #fff;
  }
  .btn-loc { background: var(--card2); border: 1px solid #2e3a52; font-size: 13px; white-space: nowrap; }
  .btn-main {
    width: 100%; background: var(--accent); font-size: 17px; padding: 15px;
    border-radius: 12px; margin-top: 4px;
  }
  .btn-main:disabled { opacity: .5; }
  .toggle { display: flex; align-items: center; gap: 10px; margin-top: 12px; font-size: 15px; }
  .toggle input { width: 20px; height: 20px; accent-color: var(--accent); }
  #status { font-size: 14px; color: var(--sub); margin: 10px 0; min-height: 20px; white-space: pre-wrap; }
  #status.error { color: var(--danger); }
  .stop {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 10px 0; border-bottom: 1px solid #2a3550;
  }
  .stop:last-child { border-bottom: none; }
  .num {
    background: var(--accent); color: #fff; font-weight: 700; font-size: 13px;
    min-width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .num.start { background: var(--accent2); }
  .stop .addr { font-size: 15px; line-height: 1.5; word-break: break-all; }
  .stop .matched { font-size: 12px; color: var(--sub); }
  .maplink {
    display: block; text-align: center; background: var(--accent2); color: #fff;
    text-decoration: none; font-weight: 700; font-size: 16px;
    padding: 14px; border-radius: 12px; margin-top: 10px;
  }
  .summary { font-size: 13px; color: var(--sub); margin-top: 10px; text-align: center; }
  #result { display: none; }
  /* 進捗チェック & 並べ替え */
  .stop .body { flex: 1; }
  .stop .handle {
    align-self: center; color: var(--sub); font-size: 22px; line-height: 1;
    padding: 6px 4px 6px 8px; cursor: grab; touch-action: none; user-select: none;
    -webkit-user-select: none; flex-shrink: 0;
  }
  .stop.dragging { opacity: .55; background: var(--card2); border-radius: 8px; }
  .stop.done .addr { text-decoration: line-through; color: var(--sub); }
  .stop.done .num { background: var(--sub); }
  .stop .num.check::after { content: '✓'; }
  .stop .body { cursor: pointer; }
  .result-head {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px;
  }
  .progress { font-size: 13px; color: var(--sub); }
  .progress b { color: var(--accent2); }
  .btn-reset {
    background: var(--card2); border: 1px solid #2e3a52; color: var(--sub);
    font-size: 12px; font-weight: 600; padding: 6px 10px;
  }
  .hint { font-size: 12px; color: var(--sub); margin: 2px 0 8px; }
</style>
</head>
<body>
  <h1>🚚 配送ルート最適化</h1>
  <p class="sub">住所をまとめて貼り付けると、最短順に並べ替えてGoogleマップでナビを開けます。</p>

  <div class="card">
    <label>出発地</label>
    <div class="row">
      <input type="text" id="origin" placeholder="例: 東京都千代田区丸の内1-1 / 空欄=現在地">
      <button class="btn-loc" id="btnLoc">📍 現在地</button>
    </div>
    <div class="row" style="margin-top:14px; justify-content:space-between">
      <label style="margin:0">配送先(1行に1件)</label>
      <button class="btn-loc" id="btnPhoto">📷 写真から抽出</button>
      <input type="file" id="photoIn" accept="image/*" multiple hidden>
    </div>
    <div style="height:6px"></div>
    <textarea id="addrs" placeholder="東京都新宿区西新宿2-8-1&#10;東京都渋谷区道玄坂1-2-3&#10;東京都港区芝公園4-2-8&#10;...&#10;&#10;📷ボタンで伝票や住所リストの写真からも取り込めます"></textarea>
    <div class="toggle">
      <input type="checkbox" id="roundtrip">
      <label for="roundtrip" style="margin:0;color:var(--text);font-weight:400">出発地に戻る(往復)</label>
    </div>
    <div id="status"></div>
    <button class="btn-main" id="btnGo">ルートを作成</button>
  </div>

  <div class="card" id="result">
    <div class="result-head">
      <label style="margin:0">配達ルート</label>
      <div class="progress" id="progress"></div>
    </div>
    <div class="hint">タップで配達完了 / ≡ を長押しドラッグで順番変更</div>
    <div id="stops"></div>
    <div id="links"></div>
    <div class="summary" id="summary"></div>
    <button class="btn-reset" id="btnReset" style="width:100%;margin-top:10px">進捗をリセット</button>
  </div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const status = (msg, isErr) => {
    $('status').textContent = msg;
    $('status').className = isErr ? 'error' : '';
  };

  // 前回入力を復元
  $('addrs').value = localStorage.getItem('addrs') || '';
  $('origin').value = localStorage.getItem('origin') || '';
  $('roundtrip').checked = localStorage.getItem('roundtrip') === '1';

  let currentPos = null;

  // === ルート状態(進捗チェック & 並べ替え) ===
  let routeStops = [];   // [出発地, 配送先1, 配送先2, ...] の順序付き配列
  let routeRound = false;
  let doneIds = new Set();

  function saveRoute() {
    try {
      localStorage.setItem('saved_route', JSON.stringify(routeStops));
      localStorage.setItem('saved_round', routeRound ? '1' : '');
      localStorage.setItem('saved_done', JSON.stringify([...doneIds]));
    } catch (_) {}
  }
  function loadRoute() {
    try {
      const r = JSON.parse(localStorage.getItem('saved_route') || 'null');
      if (r && r.length) {
        routeStops = r;
        routeRound = localStorage.getItem('saved_round') === '1';
        doneIds = new Set(JSON.parse(localStorage.getItem('saved_done') || '[]'));
        renderRoute();
        $('result').style.display = 'block';
      }
    } catch (_) {}
  }

  function computeTotal(stops, round) {
    let t = 0;
    for (let i = 0; i < stops.length - 1; i++) t += dist(stops[i], stops[i + 1]);
    if (round && stops.length > 1) t += dist(stops[stops.length - 1], stops[0]);
    return t;
  }

  function currentDelivOrder() {
    const list = $('deliv');
    if (!list) return routeStops.slice(1);
    const byId = new Map(routeStops.map(p => [p._id, p]));
    return [...list.children].map(c => byId.get(c.dataset.id)).filter(Boolean);
  }

  function makeStaticRow(badge, label, matched) {
    const div = document.createElement('div');
    div.className = 'stop';
    div.innerHTML = `<div class="num start"></div><div class="body"><div class="addr"></div><div class="matched"></div></div>`;
    div.querySelector('.num').textContent = badge;
    div.querySelector('.addr').textContent = label;
    if (matched && matched !== label) div.querySelector('.matched').textContent = matched;
    return div;
  }

  function makeDelivRow(p) {
    const div = document.createElement('div');
    div.className = 'stop' + (doneIds.has(p._id) ? ' done' : '');
    div.dataset.id = p._id;
    div.innerHTML = `<div class="num"></div><div class="body"><div class="addr"></div><div class="matched"></div></div><div class="handle">≡</div>`;
    div.querySelector('.addr').textContent = p.label;
    if (p.matched && p.matched !== p.label) div.querySelector('.matched').textContent = p.matched;
    div.querySelector('.body').addEventListener('click', () => toggleDone(p._id));
    const handle = div.querySelector('.handle');
    handle.addEventListener('pointerdown', e => startDrag(e, div, handle));
    return div;
  }

  function renderRoute() {
    if (!routeStops.length) return;
    const origin = routeStops[0];
    const delivs = routeStops.slice(1);
    const stopsEl = $('stops');
    stopsEl.innerHTML = '';
    stopsEl.appendChild(makeStaticRow('S', origin.label, origin.matched));
    const list = document.createElement('div');
    list.id = 'deliv';
    delivs.forEach(p => list.appendChild(makeDelivRow(p)));
    stopsEl.appendChild(list);
    if (routeRound) stopsEl.appendChild(makeStaticRow('G', '出発地に戻る', ''));
    renumber();
    rebuildLinks();
    updateProgress();
  }

  function renumber() {
    const list = $('deliv');
    if (!list) return;
    [...list.children].forEach((row, i) => {
      const num = row.querySelector('.num');
      const done = row.classList.contains('done');
      num.classList.toggle('check', done);
      num.textContent = done ? '' : (i + 1);
    });
  }

  function toggleDone(id) {
    if (doneIds.has(id)) doneIds.delete(id); else doneIds.add(id);
    const row = document.querySelector(`#deliv .stop[data-id="${id}"]`);
    if (row) row.classList.toggle('done');
    renumber();
    rebuildLinks();
    updateProgress();
    saveRoute();
  }

  function updateProgress() {
    const ids = new Set(routeStops.slice(1).map(p => p._id));
    const total = ids.size;
    const done = [...doneIds].filter(id => ids.has(id)).length;
    $('progress').innerHTML = `完了 <b>${done}</b> / ${total}`;
  }

  function rebuildLinks() {
    const origin = routeStops[0];
    const order = currentDelivOrder();
    const remaining = order.filter(p => !doneIds.has(p._id));
    const linksEl = $('links');
    linksEl.innerHTML = '';
    if (!remaining.length) {
      const d = document.createElement('div');
      d.className = 'maplink';
      d.style.background = 'var(--card2)';
      d.textContent = '🎉 全件配達完了!';
      linksEl.appendChild(d);
      $('summary').textContent = 'お疲れさまでした。';
      return;
    }
    const links = mapsLinks([origin, ...remaining], routeRound);
    links.forEach((url, i) => {
      const a = document.createElement('a');
      a.className = 'maplink';
      a.href = url; a.target = '_blank'; a.rel = 'noopener';
      a.textContent = links.length > 1
        ? `🗺 残りをナビ (${i + 1}/${links.length})`
        : '🗺 残りをGoogleマップでナビ';
      linksEl.appendChild(a);
    });
    const totalKm = computeTotal([origin, ...order], routeRound);
    $('summary').textContent =
      `残り${remaining.length}件 / 全${order.length}件 / 計画距離 約${totalKm.toFixed(1)} km` +
      (links.length > 1 ? ` / ${links.length}区間に分割` : '');
  }

  // --- ドラッグで並べ替え(タッチ対応) ---
  function rowAfter(list, y) {
    const rows = [...list.querySelectorAll('.stop:not(.dragging)')];
    for (const r of rows) {
      const box = r.getBoundingClientRect();
      if (y < box.top + box.height / 2) return r;
    }
    return null;
  }
  function startDrag(e, row, handle) {
    e.preventDefault();
    const list = $('deliv');
    row.classList.add('dragging');
    try { handle.setPointerCapture(e.pointerId); } catch (_) {}
    const onMove = ev => {
      const after = rowAfter(list, ev.clientY);
      if (after == null) list.appendChild(row);
      else list.insertBefore(row, after);
    };
    const onUp = () => {
      row.classList.remove('dragging');
      try { handle.releasePointerCapture(e.pointerId); } catch (_) {}
      handle.removeEventListener('pointermove', onMove);
      handle.removeEventListener('pointerup', onUp);
      handle.removeEventListener('pointercancel', onUp);
      commitOrder();
    };
    handle.addEventListener('pointermove', onMove);
    handle.addEventListener('pointerup', onUp);
    handle.addEventListener('pointercancel', onUp);
  }
  function commitOrder() {
    routeStops = [routeStops[0], ...currentDelivOrder()];
    saveRoute();
    renumber();
    rebuildLinks();
  }

  $('btnReset').onclick = () => {
    if (!routeStops.length) return;
    doneIds = new Set();
    saveRoute();
    renderRoute();
    status('進捗をリセットしました。');
  };

  $('btnLoc').onclick = () => {
    status('現在地を取得中...');
    navigator.geolocation.getCurrentPosition(
      p => {
        currentPos = { lat: p.coords.latitude, lon: p.coords.longitude };
        $('origin').value = '';
        $('origin').placeholder = `現在地を使用 (${currentPos.lat.toFixed(4)}, ${currentPos.lon.toFixed(4)})`;
        status('現在地をセットしました。出発地欄は空欄のままでOKです。');
      },
      () => status('現在地を取得できませんでした。出発地を入力してください。', true),
      { enableHighAccuracy: true, timeout: 10000 }
    );
  };

  // --- 写真から住所抽出(Tesseract.js 日本語OCR) ---
  const PREF = '(?:北海道|青森県|岩手県|宮城県|秋田県|山形県|福島県|茨城県|栃木県|群馬県|埼玉県|千葉県|東京都|神奈川県|新潟県|富山県|石川県|福井県|山梨県|長野県|岐阜県|静岡県|愛知県|三重県|滋賀県|京都府|大阪府|兵庫県|奈良県|和歌山県|鳥取県|島根県|岡山県|広島県|山口県|徳島県|香川県|愛媛県|高知県|福岡県|佐賀県|長崎県|熊本県|大分県|宮崎県|鹿児島県|沖縄県)';
  const ADDR_RE = new RegExp(
    PREF + '[0-9０-９一-龠々ぁ-んァ-ヶa-zA-Zａ-ｚＡ-Ｚー−–\\-]{3,50}', 'g');

  // OCRテキストから住所らしき文字列を抜き出す
  function extractAddresses(text) {
    const found = [];
    for (const rawLine of text.split('\n')) {
      // 日本語住所に空白は無いので、OCRが挟んだ空白を除去してから探す
      const line = rawLine.replace(/[\s　]+/g, '');
      let m;
      while ((m = ADDR_RE.exec(line)) !== null) found.push(m[0]);
    }
    return [...new Set(found)];
  }

  let tesseractWorker = null;
  async function getOcrWorker() {
    if (tesseractWorker) return tesseractWorker;
    if (!window.Tesseract) {
      status('OCRエンジンを読み込み中...(初回のみ)');
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
        s.onload = res; s.onerror = () => rej(new Error('OCRエンジンの読み込みに失敗(通信環境を確認してください)'));
        document.head.appendChild(s);
      });
    }
    status('日本語データをダウンロード中...(初回のみ・数十秒かかります)');
    tesseractWorker = await Tesseract.createWorker('jpn', 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          status(`文字を認識中... ${Math.round(m.progress * 100)}%`);
        }
      }
    });
    return tesseractWorker;
  }

  $('btnPhoto').onclick = () => $('photoIn').click();

  $('photoIn').onchange = async e => {
    const files = [...e.target.files];
    e.target.value = '';
    if (!files.length) return;
    $('btnPhoto').disabled = true;
    $('btnGo').disabled = true;
    try {
      const worker = await getOcrWorker();
      const allFound = [];
      for (let i = 0; i < files.length; i++) {
        status(files.length > 1
          ? `写真${i + 1}/${files.length}を認識中...` : '文字を認識中...');
        const { data } = await worker.recognize(files[i]);
        allFound.push(...extractAddresses(data.text));
      }
      const existing = new Set($('addrs').value.split('\n').map(s => s.trim()));
      const fresh = [...new Set(allFound)].filter(a => !existing.has(a));
      if (fresh.length) {
        $('addrs').value = ($('addrs').value.trim() + '\n' + fresh.join('\n')).trim();
        localStorage.setItem('addrs', $('addrs').value);
        status(`✅ ${fresh.length}件の住所を追加しました。誤認識がないか確認してください。`);
      } else if (allFound.length) {
        status('抽出された住所はすべて入力済みでした。');
      } else {
        status('住所を検出できませんでした。文字が大きく水平に写るよう撮り直してみてください。', true);
      }
    } catch (err) {
      status('OCRエラー: ' + err.message, true);
    } finally {
      $('btnPhoto').disabled = false;
      $('btnGo').disabled = false;
    }
  };

  // --- ジオコーディング(国土地理院 → 失敗時はNominatim) ---
  async function geocode(addr) {
    try {
      const r = await fetch('https://msearch.gsi.go.jp/address-search/AddressSearch?q=' + encodeURIComponent(addr));
      const j = await r.json();
      if (j && j.length) {
        const [lon, lat] = j[0].geometry.coordinates;
        return { lat, lon, matched: j[0].properties.title };
      }
    } catch (e) { /* fallthrough */ }
    try {
      const r = await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(addr));
      const j = await r.json();
      if (j && j.length) return { lat: +j[0].lat, lon: +j[0].lon, matched: j[0].display_name };
    } catch (e) { /* fallthrough */ }
    return null;
  }

  // --- 距離(ハーバサイン, km) ---
  const R = 6371;
  function dist(a, b) {
    const dLat = (b.lat - a.lat) * Math.PI / 180;
    const dLon = (b.lon - a.lon) * Math.PI / 180;
    const s = Math.sin(dLat/2)**2 +
      Math.cos(a.lat*Math.PI/180) * Math.cos(b.lat*Math.PI/180) * Math.sin(dLon/2)**2;
    return 2 * R * Math.asin(Math.sqrt(s));
  }

  // --- 最適化: 最近傍法 + 2-opt ---
  // pts[0] = 出発地固定。roundtrip=true なら出発地に戻る巡回路。
  function optimize(pts, roundtrip) {
    const n = pts.length;
    const D = pts.map(a => pts.map(b => dist(a, b)));

    // 最近傍法
    const visited = new Array(n).fill(false);
    visited[0] = true;
    const route = [0];
    for (let k = 1; k < n; k++) {
      const last = route[route.length - 1];
      let best = -1, bd = Infinity;
      for (let i = 0; i < n; i++) {
        if (!visited[i] && D[last][i] < bd) { bd = D[last][i]; best = i; }
      }
      route.push(best); visited[best] = true;
    }

    // 2-opt改善
    const routeLen = r => {
      let t = 0;
      for (let i = 0; i < r.length - 1; i++) t += D[r[i]][r[i+1]];
      if (roundtrip) t += D[r[r.length-1]][r[0]];
      return t;
    };
    let improved = true, guard = 0;
    while (improved && guard++ < 200) {
      improved = false;
      for (let i = 1; i < route.length - 1; i++) {
        for (let j = i + 1; j < route.length; j++) {
          const newRoute = route.slice(0, i)
            .concat(route.slice(i, j + 1).reverse(), route.slice(j + 1));
          if (routeLen(newRoute) < routeLen(route) - 1e-9) {
            route.splice(0, route.length, ...newRoute);
            improved = true;
          }
        }
      }
    }
    return { route, total: routeLen(route) };
  }

  // --- Googleマップリンク生成(経由地は9件ずつ分割) ---
  function mapsLinks(orderedPts, roundtrip) {
    const pts = orderedPts.slice();
    if (roundtrip) pts.push(pts[0]);
    const links = [];
    const MAXWP = 9; // origin + 9経由地 + destination
    let i = 0;
    while (i < pts.length - 1) {
      const chunk = pts.slice(i, Math.min(i + MAXWP + 2, pts.length));
      const c = p => `${p.lat.toFixed(6)},${p.lon.toFixed(6)}`;
      const origin = c(chunk[0]);
      const destination = c(chunk[chunk.length - 1]);
      const waypoints = chunk.slice(1, -1).map(c).join('|');
      let url = `https://www.google.com/maps/dir/?api=1&travelmode=driving&origin=${origin}&destination=${destination}`;
      if (waypoints) url += `&waypoints=${encodeURIComponent(waypoints)}`;
      links.push(url);
      i += chunk.length - 1;
    }
    return links;
  }

  $('btnGo').onclick = async () => {
    const lines = $('addrs').value.split('\n').map(s => s.trim()).filter(Boolean);
    const originText = $('origin').value.trim();
    const roundtrip = $('roundtrip').checked;

    localStorage.setItem('addrs', $('addrs').value);
    localStorage.setItem('origin', originText);
    localStorage.setItem('roundtrip', roundtrip ? '1' : '');

    if (!lines.length) { status('配送先の住所を入力してください。', true); return; }
    if (!originText && !currentPos) { status('出発地を入力するか、📍現在地ボタンを押してください。', true); return; }

    $('btnGo').disabled = true;
    $('result').style.display = 'none';

    try {
      // 出発地
      let origin;
      if (originText) {
        status('出発地を検索中...');
        const g = await geocode(originText);
        if (!g) { status(`出発地が見つかりません: ${originText}`, true); return; }
        origin = { ...g, label: originText };
      } else {
        origin = { ...currentPos, matched: '現在地', label: '現在地' };
      }

      // 配送先を順にジオコーディング(APIに優しく直列)
      const pts = [origin];
      const failed = [];
      for (let i = 0; i < lines.length; i++) {
        status(`住所を検索中... (${i + 1}/${lines.length})`);
        const g = await geocode(lines[i]);
        if (g) pts.push({ ...g, label: lines[i] });
        else failed.push(lines[i]);
        await new Promise(r => setTimeout(r, 250));
      }
      if (pts.length < 2) { status('有効な住所がありません。', true); return; }

      status('最適ルートを計算中...');
      const { route } = optimize(pts, roundtrip);
      const ordered = route.map(i => pts[i]);

      // ルート状態を確定(各配送先に安定IDを付与)し、進捗はリセット
      routeStops = ordered.map((p, i) => ({
        ...p, _id: i + '_' + Math.random().toString(36).slice(2, 8)
      }));
      routeRound = roundtrip;
      doneIds = new Set();
      saveRoute();
      renderRoute();
      $('result').style.display = 'block';

      status(failed.length
        ? `⚠ 見つからなかった住所 (${failed.length}件):\n` + failed.join('\n')
        : '完了!下のボタンでナビを開始できます。', failed.length > 0);
    } catch (e) {
      status('エラーが発生しました: ' + e.message, true);
    } finally {
      $('btnGo').disabled = false;
    }
  };

  // 前回のルートと進捗を復元
  loadRoute();
})();
</script>
</body>
</html>
